name: tests

# Runs the full test suite (headless, via jsdom) plus the i18n parity guard on
# every push and pull request. The app itself ships no dependencies; jsdom is a
# dev-only dependency used solely to run the browser suite in Node.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: i18n config parity guard
        run: node tools/check-i18n.js
      - name: Full test suite (jsdom)
        run: node tools/run-tests.js
