<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiteByBite — Test Suite</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 1.5rem }
  h1 { font-size: 1.25rem; margin-bottom: 1rem }
  #output { max-width: 760px }

  .summary { padding: 1rem 1.25rem; border-radius: 10px; margin-bottom: 1.25rem; display: flex; align-items: baseline; gap: 1rem }
  .summary.all-pass { background: #e8f5e9; border: 1px solid #a5d6a7 }
  .summary.has-fail  { background: #ffebee; border: 1px solid #ef9a9a }
  .summary .big  { font-size: 1.6rem; font-weight: 700 }
  .summary .sub  { font-size: .9rem; color: #555 }

  details.suite { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: .5rem; overflow: hidden }
  details.suite summary { padding: .65rem 1rem; cursor: pointer; display: flex; align-items: center; gap: .5rem; font-size: .875rem; font-weight: 500; list-style: none }
  details.suite summary::-webkit-details-marker { display: none }
  details.suite summary.pass { color: #2e7d32 }
  details.suite summary.fail { color: #c62828 }
  .suite .count { margin-left: auto; font-size: .75rem; color: #888; font-weight: 400 }

  .tests { padding: .25rem .75rem .5rem 1.5rem }
  .test  { font-size: .8rem; padding: .25rem 0; display: flex; flex-direction: column; gap: .15rem }
  .test.pass { color: #388e3c }
  .test.fail { color: #d32f2f }
  .test .err { font-size: .75rem; background: #fff3f3; border-left: 3px solid #ef5350; padding: .3rem .5rem; border-radius: 4px; margin-top: .15rem; font-family: monospace; white-space: pre-wrap }
</style>
</head>
<body>
<h1>BiteByBite — Test Suite</h1>
<div id="output"><em>Running…</em></div>

<!-- Hidden element that holds the full app DOM -->
<div id="app-root" style="position:absolute;left:-9999px;top:-9999px;overflow:hidden;width:1px;height:1px"></div>

<!--
  STEP 1 — Intercept window.addEventListener BEFORE app.js loads.
  This prevents the DOMContentLoaded handler in app.js from firing,
  so the app does not auto-boot (which would need real network calls).
-->
<script>
(function () {
  const _orig = window.addEventListener.bind(window);
  window.addEventListener = function (type, fn, ...rest) {
    if (type === 'DOMContentLoaded') return; // swallow app boot
    return _orig(type, fn, ...rest);
  };
})();
</script>

<!-- STEP 2 — Load app.js; all its functions become global -->
<script src="../src/app.js"></script>

<!-- STEP 3 — Test infrastructure -->
<script src="harness.js"></script>
<script src="mocks.js"></script>
<script src="setup.js"></script>

<!-- STEP 4 — Test cases -->
<script src="suite.js"></script>

<!-- STEP 5 — Bootstrap: build DOM, attach chip listeners, run tests -->
<script>
(async () => {
  // Build the app DOM once
  buildDOM();

  // Attach symptom-chip listeners via initLogTab (runs synchronously).
  // initLogTab also adds a meal card; we clear that right away.
  initLogTab();
  document.getElementById('meals-container').innerHTML = '';
  window.mealCount = 0;

  // Set up a default fetch mock so app code that leaks network calls fails gracefully
  mockFetch();

  // Run all tests
  await runSuite();

  // Restore fetch and render results
  restoreFetch();
  renderResults();
})();
</script>
</body>
</html>
